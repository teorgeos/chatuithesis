let currentScenarioIndex = -1;

function appendMessage(text, cls, imagePath = null) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "message " + cls;
  div.innerHTML = text;
  if (imagePath) {
    const img = document.createElement("img");
    img.src = imagePath;
    img.alt = "관련 이미지";
    img.className = "chat-image";
    img.onclick = () => window.open(imagePath, "_blank");
    div.appendChild(img);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function startScenario(index) {
  currentScenarioIndex = index;
  scenarioStarted = true;
  responded = false;
  document.getElementById("chat").innerHTML = "";
  document.getElementById("voiceStatus").innerText = "";
  document.getElementById("userInput").value = "";
  appendMessage("💡 궁금한 것을 물어보세요.", "system");
}

function submitInput(isVoice = false) {
  if (!scenarioStarted) return;
  const inputField = document.getElementById("userInput");
  const userText = inputField.value.trim();
  if (!userText) return;
  inputField.value = "";
  // appendMessage((isVoice ? "🎤 " : "🙋 ") + userText, "user");
  appendMessage(userText, "user");

  respondWithBot(userText, isVoice);
}

function toggleVoice() {
  const voiceBtn = document.getElementById("voiceBtn");
  const voiceStatus = document.getElementById("voiceStatus");
  const inputField = document.getElementById("userInput");

  if (!isListening) {
    // 초기화
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      voiceStatus.textContent = "❌ 음성 인식이 지원되지 않습니다.";
      return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "ko-KR";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    voiceStatus.textContent = "🎙️ 음성 인식 중...";
    voiceBtn.textContent = "✅ 인식 완료";
    isListening = true;

    recognition.onresult = function(event) {
      const result = event.results[0][0].transcript;
      inputField.value = result;
      console.log("🟢 인식된 문장:", result);
    };

    recognition.onerror = function(event) {
      console.error("🔴 오류 발생:", event.error);
      voiceStatus.textContent = "❌ 오류: " + event.error;
      isListening = false;
      voiceBtn.textContent = "🎤 음성";
    };

    recognition.onend = function() {
      console.log("🔚 인식 종료됨");
    };

    recognition.start();
  } else {
    recognition.stop();
    voiceStatus.textContent = "🎤 인식 완료됨.";
    voiceBtn.textContent = "🎤 음성";
    isListening = false;
    submitInput(true);
  }
}

function downloadLog() {
  // const name = document.getElementById("participantName").value.trim() || "anonymous";
  const name = "anonymous";
  const fullLog = {
    participant: name,
    logs: logData
  };

  const blob = new Blob([JSON.stringify(fullLog, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `chat_log_${name}_${currentScenarioIndex + 1}.json`;
  a.click();
  URL.revokeObjectURL(url);
}


document.getElementById("userInput").addEventListener("keypress", function(event) {
  if (event.key === "Enter") {
    event.preventDefault();
    submitInput(false);
  }
});

function enterChatKeyboard() {
  document.getElementById("introScreen").style.display = "none";

  // 요소 가져오기
  const input = document.getElementById("userInput");
  const sendBtn = document.querySelector('button[onclick="submitInput(false)"]');
  const voiceBtn = document.getElementById("voiceBtn");
  const logBtn = document.querySelector('button[onclick="downloadLog()"]');
  const voiceStatus = document.getElementById("voiceStatus");

  // 키보드 모드
  input.style.display = "block";
  sendBtn.style.display = "block";
  voiceBtn.style.display = "none";
  logBtn.style.display = "block";
  voiceStatus.style.display = "none";

  startScenario(0);
}


function enterChatVoice() {
  document.getElementById("introScreen").style.display = "none";

  const input = document.getElementById("userInput");
  const sendBtn = document.querySelector('button[onclick="submitInput(false)"]');
  const voiceBtn = document.getElementById("voiceBtn");
  const logBtn = document.querySelector('button[onclick="downloadLog()"]');
  const voiceStatus = document.getElementById("voiceStatus");

  // 음성 모드
  input.style.display = "none";
  sendBtn.style.display = "none";
  voiceBtn.style.display = "block";
  logBtn.style.display = "block";

  // 🔥 placeholder 대신 텍스트로
  voiceStatus.style.display = "block";
  voiceStatus.innerText = "🎤 버튼을 눌러 말하세요";

  startScenario(0);
}
